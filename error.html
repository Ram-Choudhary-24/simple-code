<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Nature Gallery</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .error-container {
            margin-top: 100px;
            padding: 40px;
        }
        .error-code {
            font-size: 80px;
            color: #d32f2f;
            margin: 0;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #2e7d32;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .back-btn:hover {
            background-color: #1b5e20;
        }
    </style>
</head>
<body>

    <div class="error-container">
        <h1 class="error-code">404</h1>
        <h2>Oops! This trail is lost.</h2>
        <p>The nature photo or page you are looking for doesn't exist.</p>
        <a href="index.html" class="back-btn">Go Back to Gallery</a>
    </div>

</body>
</html>
